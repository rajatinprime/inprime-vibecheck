    const PARAM_KEYS = PARAMS.map(p => p.key);

    // ─── Local Storage ────────────────────────────────────────
    // Data shape: { feedback: { "reviewerId:revieweeId": { scores, strengthText, growthText, submittedAt } } }
    const DB_KEY = "inprime_360_v1";

    async function dbRead() {
      try {
        const raw = localStorage.getItem(DB_KEY);
        return raw ? JSON.parse(raw) : { feedback: {} };
      } catch(e) { return { feedback: {} }; }
    }

    async function dbWrite(data) {
      localStorage.setItem(DB_KEY, JSON.stringify(data));
    }

    // ─── Submission Codes ─────────────────────────────────────
    function encodeCode(reviewerId, revieweeId, scores, strengthText, growthText) {
      const obj = { r: reviewerId, e: revieweeId, s: scores, st: strengthText || "", gt: growthText || "", t: new Date().toISOString() };
      return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
    }

    function decodeCode(code) {
      try { return JSON.parse(decodeURIComponent(escape(atob(code.trim())))); }
      catch(e) { return null; }
    }

    async function importCodes(rawText) {
      const lines = rawText.split(/[\n,]+/).map(l => l.trim()).filter(Boolean);
      let ok = 0, fail = 0;
      const data = await dbRead();
      for (const line of lines) {
        const sub = decodeCode(line);
        if (!sub || !sub.r || !sub.e || !sub.s) { fail++; continue; }
        data.feedback[`${sub.r}:${sub.e}`] = { scores: sub.s, strengthText: sub.st, growthText: sub.gt, submittedAt: sub.t };
        ok++;
      }
      await dbWrite(data);
      return { ok, fail };
    }

    async function saveFeedback(reviewerId, revieweeId, scores, strengthText, growthText) {
      try {
        const data = await dbRead();
        data.feedback[`${reviewerId}:${revieweeId}`] = { scores, strengthText, growthText, submittedAt: new Date().toISOString() };
        await dbWrite(data);
        return true;
      } catch(e) { console.error("Save failed", e); return false; }
    }

    async function loadAllFeedbackForPerson(personId) {
      const data = await dbRead();
      const fb = data.feedback || {};
      let selfData = null;
      const peerSubmissions = [];
      for (const [key, val] of Object.entries(fb)) {
        const parts = key.split(":");
        const reviewerId = Number(parts[0]);
        const revieweeId = Number(parts[1]);
        if (revieweeId !== personId) continue;
        if (reviewerId === personId) { selfData = val; }
        else { peerSubmissions.push(val); }
      }
      return { selfData, peerSubmissions };
    }

    async function loadExistingSubmission(reviewerId, revieweeId) {
      const data = await dbRead();
      return data.feedback?.[`${reviewerId}:${revieweeId}`] || null;
    }

    // ─── Helpers ─────────────────────────────────────────────
    function computePeerAvg(subs) {
      if (!subs.length) return null;
      const totals = {}; PARAM_KEYS.forEach(k => { totals[k] = 0; });
      subs.forEach(s => { PARAM_KEYS.forEach(k => { totals[k] += (s.scores?.[k] || 0); }); });
      const r = {}; PARAM_KEYS.forEach(k => { r[k] = +(totals[k] / subs.length).toFixed(1); });
      return r;
    }
    function avgObj(o) {
      const vals = Object.values(o).filter(v => v > 0);
      if (!vals.length) return 0;
      return +(vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1);
    }
    function emptyScores() { const o = {}; PARAM_KEYS.forEach(k => { o[k] = 0; }); return o; }

    // ─── Star Rating ─────────────────────────────────────────
    function StarRating({ value, onChange }) {
      const [hover, setHover] = useState(0);
      const labels = ["","Needs significant improvement","Below expectations","Meets expectations","Above expectations","Exceptional"];
      return (
        <div style={{ display:"flex", alignItems:"center", gap:2, flexWrap:"wrap" }}>
          {[1,2,3,4,5].map(n => (
            <button key={n} onMouseEnter={()=>setHover(n)} onMouseLeave={()=>setHover(0)} onClick={()=>onChange(n)}
              style={{ background:"none", border:"none", cursor:"pointer", padding:"6px 4px", fontSize:32, lineHeight:1, minWidth:44, minHeight:44,
                display:"flex", alignItems:"center", justifyContent:"center",
                color: n<=(hover||value) ? "#F9A825" : "#1a2e2a",
                transform: n<=(hover||value) ? "scale(1.1)" : "scale(1)", transition:"all 0.1s" }}>★</button>
          ))}
          {(hover||value) > 0 && <div style={{ fontSize:11, color:"#888", marginTop:4, width:"100%" }}>{labels[hover||value]}</div>}
        </div>
      );
    }

    // ─── Feedback Form ────────────────────────────────────────
    function FeedbackForm({ onBack }) {
      const [step, setStep]             = useState(1);
      const [reviewerId, setReviewerId] = useState(null);

      const [growthText, setGrowthText]     = useState("");
      const [saving, setSaving]         = useState(false);
      const [myCode, setMyCode]         = useState("");

      const allScored = PARAM_KEYS.every(k => scores[k] > 0);
      const scoredCount = PARAM_KEYS.filter(k => scores[k] > 0).length;
      const progressPct = step===1?8:step===2?22:step===3?(22+(scoredCount/PARAM_KEYS.length)*50):step===4?82:100;

      useEffect(() => {
        if (!reviewerId || !revieweeId) return;
        loadExistingSubmission(reviewerId, revieweeId).then(ex => {
          if (ex) { setScores(ex.scores || emptyScores()); setStrengthText(ex.strengthText||""); setGrowthText(ex.growthText||""); }
          else { setScores(emptyScores()); setStrengthText(""); setGrowthText(""); }
        });
      }, [reviewerId, revieweeId]);

      async function handleSubmit() {
        setSaving(true);
        const code = encodeCode(reviewerId, revieweeId, scores, strengthText, growthText);
        const ok = await saveFeedback(reviewerId, revieweeId, scores, strengthText, growthText);
        setSaving(false);
        if (ok) { setMyCode(code); setStep(5); }
      }

      return (

            </div>

          {step === 1 && (

    // ─── Gap View ─────────────────────────────────────────────
    function GapView({ selfScores, peerScores, person }) {
      const hasSelf=!!selfScores, hasPeers=!!peerScores;
      if (!hasSelf && !hasPeers) return (
        <div style={{ background:"#0d1e1c", border:"1px solid #0f2520", borderRadius:20, padding:40, textAlign:"center" }}>
          <div style={{ fontSize:40, marginBottom:12 }}>📭</div>
          <div style={{ color:"#3a5a54", fontSize:14 }}>No feedback yet for {person.name.split(" ")[0]}.</div>
          <div style={{ color:"#2a4040", fontSize:12, marginTop:6 }}>Scores appear once self-rating and peer reviews are submitted.</div>
        </div>
      );
      const rows = PARAMS.map(p => ({
        ...p, self:hasSelf?(selfScores[p.key]||0):null, peers:hasPeers?(peerScores[p.key]||0):null,
        gap:(hasSelf&&hasPeers)?+(selfScores[p.key]-peerScores[p.key]).toFixed(1):null
      })).sort((a,b)=>(Math.abs(b.gap||0)-Math.abs(a.gap||0)));
      return (
        <div style={{ background:"#0d1e1c", border:"1px solid #1a3530", borderRadius:20, padding:22 }}>
          <h3 style={{ color:"#fff", margin:"0 0 4px", fontSize:16, fontWeight:800 }}>🔍 Self vs Peer Perception</h3>
          <p style={{ color:"#2a5050", fontSize:12, margin:"0 0 14px", lineHeight:1.6 }}>
            {hasSelf&&hasPeers?"Biggest gaps — your richest signals for growth.":!hasSelf?"Peer scores shown. Add your self-rating to see the comparison.":"Your self-rating shown. Peer scores appear once colleagues submit."}
          </p>
          <div style={{ display:"flex", gap:14, marginBottom:12, flexWrap:"wrap" }}>
            {hasSelf && <span style={{ fontSize:11, color:"#F9A825", fontWeight:600 }}>🟡 Self rating</span>}
            {hasPeers && <span style={{ fontSize:11, color:"#54A0FF", fontWeight:600 }}>🔵 Peer average ({Math.round(peerScores?._count||0)} reviewer{(peerScores?._count||0)!==1?"s":""})</span>}
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {rows.map(p => {
              const tag=p.gap===null?null:p.gap>0.4?{t:"↑ Self > Peers",c:"#FF9F43"}:p.gap<-0.4?{t:"↑ Peers > Self",c:"#54A0FF"}:{t:"✓ Aligned",c:"#10AC84"};
              return (
                <div key={p.key} style={{ background:"#0a1714", borderRadius:12, padding:"13px 15px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:9 }}>
                    <span style={{ fontSize:13, fontWeight:700, color:"#ddd" }}>{p.icon} {p.label}</span>
                    {tag && <span style={{ fontSize:10, background:tag.c+"20", color:tag.c, border:`1px solid ${tag.c}40`, borderRadius:6, padding:"2px 8px", fontWeight:700 }}>{tag.t}</span>}
                  </div>
                  {hasSelf && (
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <div style={{ fontSize:10, color:"#F9A825", width:26, textAlign:"right" }}>You</div>
                      <div style={{ flex:1, background:"#ffffff08", borderRadius:4, height:7, overflow:"hidden" }}><div style={{ width:`${(p.self/5)*100}%`, height:"100%", background:"#F9A825", borderRadius:4 }}/></div>
                      <div style={{ fontSize:12, fontWeight:700, color:"#F9A825", width:22 }}>{p.self}</div>
                    </div>
                  )}
                  {hasPeers && (
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ fontSize:10, color:"#54A0FF", width:26, textAlign:"right" }}>Peers</div>
                      <div style={{ flex:1, background:"#ffffff08", borderRadius:4, height:7, overflow:"hidden" }}><div style={{ width:`${(p.peers/5)*100}%`, height:"100%", background:"#54A0FF", borderRadius:4 }}/></div>
                      <div style={{ fontSize:12, fontWeight:700, color:"#54A0FF", width:22 }}>{p.peers}</div>
                    </div>
                  )}
                  {p.gap!==null && Math.abs(p.gap)>0.8 && (
                    <div style={{ marginTop:8, fontSize:11, color:tag.c, background:tag.c+"10", borderRadius:6, padding:"5px 10px" }}>
                      {p.gap>0?"💡 Peers may see a different picture here. Worth a conversation.":"💡 You're underselling this — peers consistently rate you higher. Own it."}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Radar View ───────────────────────────────────────────
    function RadarView({ selfScores, peerScores, person }) {
      const hasBoth=selfScores&&peerScores, src=selfScores||peerScores;
      if (!src) return <div style={{ background:"#0d1e1c", border:"1px solid #0f2520", borderRadius:20, padding:40, textAlign:"center" }}><div style={{ color:"#3a5a54", fontSize:14 }}>No data yet — submit feedback to see the radar.</div></div>;
      const data = PARAMS.map(p => ({ p:p.label.length>13?p.label.slice(0,12)+"…":p.label, ...(selfScores?{Self:selfScores[p.key]||0}:{}), ...(peerScores?{Peers:peerScores[p.key]||0}:{}) }));
      return (
        <div style={{ background:"#0d1e1c", border:"1px solid #1a3530", borderRadius:20, padding:22 }}>
          <h3 style={{ color:"#ddd", margin:"0 0 4px", fontSize:16, fontWeight:700 }}>🕸️ Radar View</h3>
          <p style={{ color:"#2a5050", fontSize:12, margin:"0 0 14px" }}>{hasBoth?"Overlap shows alignment between self and peer perception.":selfScores?"Your self-rating across all 10 dimensions.":"Peer average across all 10 dimensions."}</p>
          <ResponsiveContainer width="100%" height={300}>
            <RadarChart data={data} margin={{top:10,right:34,bottom:10,left:34}}>
              <PolarGrid stroke="#1a3530"/>
              <PolarAngleAxis dataKey="p" tick={{fill:"#555",fontSize:11}}/>
              {selfScores  && <Radar name="Self"  dataKey="Self"  stroke="#F9A825" fill="#F9A825" fillOpacity={0.18} strokeWidth={2.5}/>}
              {peerScores  && <Radar name="Peers" dataKey="Peers" stroke="#54A0FF" fill="#54A0FF" fillOpacity={0.14} strokeWidth={2}/>}
            </RadarChart>
          </ResponsiveContainer>
          <div style={{ display:"flex", gap:20, justifyContent:"center", marginTop:6, flexWrap:"wrap" }}>
            {selfScores  && <span style={{ fontSize:12, color:"#F9A825" }}>● Self ({avgObj(selfScores)})</span>}
            {peerScores  && <span style={{ fontSize:12, color:"#54A0FF" }}>● Peers ({avgObj(peerScores)})</span>}
          </div>
        </div>
      );
    }

    // ─── Param Info ───────────────────────────────────────────
    function ParamInfo() {
      const [open, setOpen] = useState(null);
      const COLS = [TEAL,"#54A0FF","#4ECDC4","#F9A825","#FF7043","#7C4DFF","#26A69A","#42A5F5","#66BB6A","#EF5350"];
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
          {PARAMS.map((p,i) => { const c=COLS[i], isOpen=open===p.key; return (
            <div key={p.key} onClick={()=>setOpen(isOpen?null:p.key)}
              style={{ background:"#0a1714", border:`1px solid ${isOpen?c+"55":"#0f2520"}`, borderRadius:12, padding:"11px 14px", cursor:"pointer" }}>
              <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                <div style={{ width:34, height:34, borderRadius:9, background:c+"1a", display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, flexShrink:0 }}>{p.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:13, color:isOpen?c:"#ddd" }}>{p.label}</div>
                  <div style={{ fontSize:11, color:"#2a4a44", marginTop:1 }}>{p.short}</div>
                </div>
                <div style={{ color:"#1a3530", fontSize:11, transition:"transform 0.2s", transform:isOpen?"rotate(180deg)":"none" }}>▼</div>
              </div>
              {isOpen && <div style={{ marginTop:11, paddingTop:11, borderTop:`1px solid ${c}18`, fontSize:13, color:"#6a8a84", lineHeight:1.85 }}>{p.detail}</div>}
            </div>
          ); })}
        </div>
      );
    }

    // ─── Individual Dashboard ─────────────────────────────────
    function Dashboard({ person, onBack, onGiveFeedback }) {
      const [tab, setTab]   = useState("gap");
      const [loading, setLoading] = useState(true);
      const [selfData, setSelfData]   = useState(null);
      const [peerData, setPeerData]   = useState(null);
      const [peerCount, setPeerCount] = useState(0);
      const [textFeedback, setTextFeedback] = useState({ strengths:[], improvements:[] });
      const m = useMobile();

      useEffect(() => {
        setLoading(true);
        loadAllFeedbackForPerson(person.id).then(({ selfData:sd, peerSubmissions }) => {
          setSelfData(sd?.scores||null);
          if (peerSubmissions.length > 0) {
            const avg = computePeerAvg(peerSubmissions); avg._count = peerSubmissions.length;
            setPeerData(avg); setPeerCount(peerSubmissions.length);
            setTextFeedback({ strengths:peerSubmissions.filter(s=>s.strengthText).map(s=>s.strengthText), improvements:peerSubmissions.filter(s=>s.growthText).map(s=>s.growthText) });
          }
          setLoading(false);
        });
      }, [person.id]);

      const selfAvg=selfData?avgObj(selfData):null, peersAvg=peerData?avgObj(peerData):null;

    // ─── Admin Import Panel ───────────────────────────────────
    function AdminPanel({ onClose }) {
      const [codes, setCodes]   = useState("");
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const m = useMobile();

      async function handleImport() {
        if (!codes.trim()) return;
        setLoading(true);
        const res = await importCodes(codes);
        setResult(res);
        setLoading(false);
        if (res.ok > 0) setCodes("");
      }

      async function handleClear() {
        if (!window.confirm("Clear ALL feedback data from this device? This cannot be undone.")) return;
        localStorage.removeItem(DB_KEY);
        setResult({ cleared: true });
      }

      return (
        <div style={{ position:"fixed", inset:0, background:"#000a", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ background:"#0d1e1c", border:"1px solid #1a3530", borderRadius:20, padding:24, width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <h2 style={{ color:"#fff", fontSize:17, fontWeight:800, margin:0 }}>🔐 Admin Panel</h2>
              <button onClick={onClose} style={{ background:"none", border:"1px solid #1a3530", color:"#888", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:13 }}>✕ Close</button>
            </div>

            <div style={{ background:"#0a1714", border:"1px solid #10AC8430", borderRadius:12, padding:14, marginBottom:18, fontSize:12, color:"#2a6050", lineHeight:1.7 }}>
              📱 <strong style={{ color:TEAL }}>How it works:</strong> Each team member copies their submission code after submitting. Paste all the codes here (one per line or comma-separated) to import them into the dashboard.
            </div>

            <label style={{ fontSize:12, fontWeight:700, color:"#aaa", display:"block", marginBottom:8 }}>Paste submission codes from your team</label>
            <textarea value={codes} onChange={e=>{ setCodes(e.target.value); setResult(null); }} rows={6}
              placeholder="Paste codes here, one per line…"
              style={{ width:"100%", background:"#060f0e", border:"1px solid #1a3530", borderRadius:10, padding:"10px 12px", color:"#ccc", fontSize:11, fontFamily:"monospace", resize:"vertical", lineHeight:1.5 }}/>

            <button onClick={handleImport} disabled={loading || !codes.trim()}
              style={{ width:"100%", marginTop:10, padding:"12px", background:codes.trim()?TEAL:"#0f1e1c", border:"none", borderRadius:10, color:codes.trim()?"#fff":"#2a4040", fontSize:14, fontWeight:700, cursor:codes.trim()?"pointer":"not-allowed" }}>
              {loading?"Importing…":"⬆ Import Codes"}
            </button>

            {result && !result.cleared && (
              <div style={{ marginTop:12, padding:"10px 14px", background: result.ok>0?"#10AC8420":"#FF6B6B20", border:`1px solid ${result.ok>0?"#10AC8440":"#FF6B6B40"}`, borderRadius:10, fontSize:13, color: result.ok>0?TEAL:"#FF6B6B", textAlign:"center" }}>
                {result.ok>0?`✓ ${result.ok} submission${result.ok!==1?"s":""} imported successfully!`:""}
                {result.fail>0?` ${result.fail} code${result.fail!==1?"s":""} could not be read.`:""}
              </div>
            )}
            {result?.cleared && (
              <div style={{ marginTop:12, padding:"10px 14px", background:"#FF6B6B20", border:"1px solid #FF6B6B40", borderRadius:10, fontSize:13, color:"#FF6B6B", textAlign:"center" }}>
                ✓ All local data cleared.
              </div>
            )}

            <div style={{ borderTop:"1px solid #0f2520", marginTop:20, paddingTop:16 }}>
              <button onClick={handleClear} style={{ width:"100%", padding:"10px", background:"none", border:"1px solid #FF6B6B40", borderRadius:10, color:"#FF6B6B88", fontSize:12, cursor:"pointer" }}>
                🗑 Clear all local feedback data
              </button>
            </div>
          </div>
        </div>
      );
    }

                  style={{ width:"100%", background:"#0d1e1c", border:"1px solid #0f2520", borderRadius:11, padding:"11px 15px", color:"#ccc", fontSize:14, marginBottom:14, outline:"none" }}/>
                <div style={{ display:"grid", gridTemplateColumns:m?"repeat(2,1fr)":"repeat(auto-fill,minmax(255px,1fr))", gap:m?8:11 }}>
                  {filtered.map(p => <TeamCard key={p.id} person={p} onClick={()=>{setSelected(p.id);setView("dashboard");}}/>)}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
